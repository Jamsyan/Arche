# CodeRabbit AI PR 审查配置
# 安装: https://github.com/apps/coderabbitai 安装到本仓库
# 文档: https://docs.coderabbit.ai/

language: zh-CN

reviews:
  # 审查等级: chill（宽松） / assertive（适中）
  profile: assertive
  request_changes_workflow: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - master
      - main

  # ── Walkthrough 精简 ──
  poem: false                          # 关闭诗歌
  changed_files_summary: false         # 关闭大表格，walkthrough 更短
  sequence_diagrams: false             # 关闭 Mermaid 时序图
  estimate_code_review_effort: false   # 关闭预估评审时间
  related_issues: false                # 关闭关联 issue 推荐
  related_prs: false                   # 关闭关联 PR 推荐
  suggested_labels: false              # 关闭标签建议
  suggested_reviewers: false           # 关闭审查者建议
  enable_prompt_for_ai_agents: false   # 关闭 inline comment 中的 AI Agent 提示

  # ── Summary 放置到 walkthrough 中，保持 PR 描述干净 ──
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  high_level_summary_instructions: |
    用 2-3 句话总结 PR 的核心变更，不要列文件清单。按「新增功能 / 修复 / 重构 / 测试」分类简述。

  # ── Pre-merge checks: 只保留真正有判断力的项 ──
  pre_merge_checks:
    title:
      mode: warning                    # 标题检查保留 warning 级别
    description:
      mode: off                        # 关闭描述检查（总是 skip，无意义）
    docstrings:
      mode: off                        # 关闭 docstring 覆盖率检查
    issue_assessment:
      mode: off                        # 关闭链接 issue 评估

  tools:
    python:
      enabled: true
      lint:
        enabled: true
    typescript:
      enabled: true
    vue:
      enabled: true
    markdown:
      enabled: true
    yaml:
      enabled: true

  system_message: |
    你是一个资深代码审查专家，审查 Arche 项目的 Pull Request。

    ## 项目概览
    - **后端**: Python + FastAPI + SQLAlchemy + aiosqlite/SQLite
    - **前端**: Vue 3 + TypeScript + Vite + 自研组件库（ArButton, ArCard 等）
    - **架构**: 微内核 + 插件模式，插件位于 `backend/plugins/`，各自包含 `__init__.py`（插件类）、`routes.py`（路由）、`services.py`（服务）、`models.py`（数据模型）
    - **测试**: pytest（后端）、vitest（前端）

    ## 审查重点
    1. **逻辑正确性**：是否存在空指针、并发竞争、SQL 注入等潜在问题
    2. **架构一致性**：新功能是否按 plugin 模式组织，是否依赖了正确的核心抽象
    3. **代码规范**：
       - 禁止使用 `lambda`（已配置自定义 lint 规则拦截）
       - 嵌套推导式不超过 1 层
       - 遵循现有的命名风格（Python: snake_case, TypeScript: camelCase）
       - 后端错误使用 `AppError` 异常体系
    4. **测试覆盖**：新增逻辑是否缺少对应测试，测试是否合理
    5. **安全**：用户输入是否经过校验，权限检查是否到位
    6. **文档**：API 变更是否同步更新了前端类型定义或文档

    ## 回复风格
    - 使用中文回复
    - 只说真正有质量的问题，不要为了凑数量而提无意义的建议
    - 每个问题给出具体代码位置（文件名+行号）
    - 严重问题标记为 "CHANGES REQUESTED"，确保一针见血
    - 小建议标记为 "SUGGESTION"，简洁到一句话能说清楚
    - 如果代码没有问题，简洁回复 "LGTM"
    - 不要输出「Prompt for AI Agents」类内容
