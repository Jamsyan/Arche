[project]
name = "veil"
version = "0.1.0"
description = "Personal modular platform - microkernel architecture"
requires-python = ">=3.10"

dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "pydantic>=2.0",
    "bcrypt>=5.0.0",
    "pyjwt>=2.12.1",
    "sqlalchemy>=2.0.49",
    "starlette>=1.0.0",
    "alembic>=1.18.4",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
]

[[tool.uv.index]]
url = "https://mirrors.aliyun.com/pypi/simple/"
default = true
