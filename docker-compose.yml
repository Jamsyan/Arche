services:
  nginx:
    image: crpi-furbxf8d6ydk7jxx.cn-shanghai.personal.cr.aliyuncs.com/jamd/arche:frontend-latest
    container_name: arche-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /ssl:/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: crpi-furbxf8d6ydk7jxx.cn-shanghai.personal.cr.aliyuncs.com/jamd/arche:backend-latest
    container_name: arche-backend
    expose:
      - "8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:latest
    container_name: arche-postgres
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-postgres}
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: arche-minio
    command: server /data --console-address ":9001"
    env_file: .env
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  pgdata:
  minio-data:
