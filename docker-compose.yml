services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: veil-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /ssl:/ssl:ro
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: veil-backend
    expose:
      - "8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: veil-postgres
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U veil
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: veil-minio
    command: server /data --console-address ":9001"
    env_file: .env
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data

volumes:
  pgdata:
  minio-data:
