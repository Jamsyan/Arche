name: Feature Request
description: 提议一个新功能或改进
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题
      description: 这个功能要解决什么问题？有什么痛点？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望怎么实现？
    validations:
      required: true
