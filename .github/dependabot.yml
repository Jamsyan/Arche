version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci(deps): "

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps(python): "
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dev-deps:
        patterns:
          - "pytest*"
          - "ruff*"
          - "mypy*"
          - "coverage*"
        update-types:
          - "patch"
          - "minor"
      runtime-deps:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps(npm): "
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dev-deps:
        patterns:
          - "eslint*"
          - "prettier*"
          - "typescript*"
          - "@types*"
          - "@typescript-eslint*"
          - "vite*"
          - "vue-tsc*"
          - "rollup*"
          - "unplugin-*"
          - "esbuild*"
          - "vue-eslint-parser"
          - "@rushstack*"
          - "@vitejs*"
          - "@vue/*"
        update-types:
          - "patch"
          - "minor"
      runtime-deps:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
