# AI 文档自动生成
# 在 push 到 master 时，自动生成 README 草案并提交 PR，供人工审阅后合并
# 需要设置仓库 Secret: DEEPSEEK_API_KEY

name: AI Documentation

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "frontend/src/**"
      - "pyproject.toml"
      - "frontend/package.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 readmeai
        run: pip install readmeai

      - name: AI 生成 README 草案
        id: generate
        run: |
          readmeai --model deepseek-chat \
                   --api-key "${{ secrets.DEEPSEEK_API_KEY }}" \
                   --repository "${{ github.repository }}" \
                   --output README.ai.md \
                   --badges \
                   --emojis
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL: https://api.deepseek.com/v1
        continue-on-error: true

      - name: 回落方案 — 直接调用 API 生成摘要
        if: steps.generate.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const plugins = fs.readdirSync('backend/plugins')
              .filter(f => fs.statSync(`backend/plugins/${f}`).isDirectory())
              .join(', ');

            const prompt = [
              '生成以下项目的功能和架构简介（中文，200字以内）：',
              `插件: ${plugins}`,
              '技术栈: FastAPI + Vue 3 + TypeScript + SQLite',
              '架构: 微内核 + 插件模式'
            ].join('\n');

            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.DEEPSEEK_API_KEY}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'deepseek-chat',
                messages: [
                  { role: 'system', content: '你是一个技术文档助手。生成简洁、准确的中文项目描述。' },
                  { role: 'user', content: prompt }
                ]
              })
            });

            const data = await response.json();
            const summary = data.choices[0].message.content;

            let readme = fs.readFileSync('README.md', 'utf8');
            if (!readme.includes('<!-- ai-summary -->')) {
              readme += '\n\n---\n<!-- ai-summary -->\n## AI 项目摘要\n\n' +
                summary + '\n\n*此章节由 AI 自动生成，内容可能不准确，请人工审阅。*\n';
              fs.writeFileSync('README.md', readme);
            }

      - name: 创建 Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          title: "docs: AI 自动更新文档"
          body: |
            ## 变更内容

            由 AI 自动生成的文档更新草案。

            - README 内容更新（如果 AI 生成了新的 README）
            - 项目摘要追加

            > 请审阅后合并，如有问题可直接关闭此 PR。
          commit-message: "docs: AI 自动更新文档草案"
          branch: ai/docs-update
          delete-branch: true
          add-paths: |
            README.md
            README.ai.md
