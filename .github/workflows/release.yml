name: Release SDK

# 手动触发，不自动执行
on:
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version (e.g., 0.1.0). Leave empty to auto-increment."
        required: false
        type: string
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            VER="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Releasing SDK v${VER}"

      # ── TODO: 以下为 SDK 发布步骤，待 SDK 实现后启用 ──

      # - name: Build SDK
      #   run: |
      #     # 构建 SDK 产物
      #     echo "Build SDK v${{ steps.version.outputs.version }}"

      # - name: Publish to PyPI / npm
      #   run: |
      #     # 发布到包管理平台
      #     echo "Publish SDK package"

      # - name: Create GitHub Release
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag_name: sdk-v${{ steps.version.outputs.version }}
      #     name: SDK v${{ steps.version.outputs.version }}
      #     generate_release_notes: true

      - name: Summary
        run: |
          echo "## SDK Release v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SDK 发布流程已就绪，待 SDK 实现后自动启用打包和发布步骤。" >> $GITHUB_STEP_SUMMARY
