name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

jobs:
  # ── 后端：lint + format + 测试（共享 venv，一个 job 搞定） ──
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check backend/

      - name: Format check
        run: uv run ruff format --check backend/

      - name: Custom lint rules
        run: uv run python scripts/lint_rules.py --fail backend/

      - name: Run tests
        run: uv run pytest

  # ── 前端：typecheck + build + 测试（共享 node_modules，一个 job 搞定） ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify generated API types exist
        working-directory: frontend
        run: test -f src/services/api/generated.d.ts && echo "API types OK"

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run tests
        working-directory: frontend
        run: npm run test:run

  # ── 代码安全扫描（CodeQL） ──
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ── 构建（版本路由在 build.yml 内部处理） ──
  build:
    needs: [backend, frontend, security-scan]
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit

  # ── 发布（创建 Tag + GitHub Release + 上传部署包） ──
  release:
    needs: [build]
    if: needs.build.outputs.image_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create deployment bundle
        run: |
          TAG="${{ needs.build.outputs.image_tag }}"
          BUNDLE="arche-v${TAG}"
          mkdir -p "${BUNDLE}"

          # 收集部署所需文件
          [ -f docker-compose.yml ] && cp docker-compose.yml "${BUNDLE}/"
          [ -d nginx ]            && cp -r nginx "${BUNDLE}/"
          [ -f .env.example ]     && cp .env.example "${BUNDLE}/"
          [ -d scripts ]          && cp -r scripts "${BUNDLE}/"

          # 写入部署说明
          cat > "${BUNDLE}/README.txt" <<-EOM
          Arche v${TAG} 部署包
          ====================
          镜像版本: backend-${TAG}, frontend-${TAG}
          部署方式: docker-compose up -d
          EOM

          zip -r "arche-v${TAG}.zip" "${BUNDLE}/"
          echo "Created: arche-v${TAG}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.image_tag }}
          name: v${{ needs.build.outputs.image_tag }}
          body: |
            镜像标签：`backend-${{ needs.build.outputs.image_tag }}` / `frontend-${{ needs.build.outputs.image_tag }}`

            ### 部署
            ```bash
            docker-compose pull
            docker-compose up -d
            ```
          files: arche-v${{ needs.build.outputs.image_tag }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 部署 ──
  deploy:
    needs: [build]
    if: needs.build.outputs.image_tag != ''
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit
