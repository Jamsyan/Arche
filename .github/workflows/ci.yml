name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/**"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/**"
  workflow_dispatch:

jobs:
  # ── 代码质量（快速，始终跑） ──
  lint:
    uses: ./.github/workflows/lint.yml

  # ── 安全扫描（CodeQL 中等开销，始终跑） ──
  security:
    uses: ./.github/workflows/security.yml

  # ── 测试验证 ──
  test:
    uses: ./.github/workflows/test.yml

  # ── 构建 ──
  build:
    needs: [lint, security, test]
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
