name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/**"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/**"
  workflow_dispatch:

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  security:
    uses: ./.github/workflows/security.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  adversarial:
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/adversarial.yml
    permissions:
      contents: read
      issues: write

  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [lint, security, test]
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit

  release:
    needs: [build]
    if: needs.build.outputs.image_tag != ''
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit

  deploy:
    needs: [build]
    if: needs.build.outputs.image_tag != ''
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit
