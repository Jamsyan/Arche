name: Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: registry.cn-shanghai.aliyuncs.com
  IMAGE_NAME: ${{ secrets.ALIYUN_NAMESPACE }}/Arche

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Lint
        run: uv run ruff check backend/

      - name: Format check
        run: uv run ruff format --check backend/

      - name: Run tests
        run: uv run pytest --if-present

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  build-and-push:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Generate tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "sha=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "backend_tag=${REGISTRY}/${IMAGE_NAME}:backend-${TIMESTAMP}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "frontend_tag=${REGISTRY}/${IMAGE_NAME}:frontend-${TIMESTAMP}-${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ steps.tags.outputs.backend_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:backend-latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.tags.outputs.frontend_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:frontend-latest

      - name: Write image tags
        run: |
          echo "BACKEND_TAG=${{ steps.tags.outputs.backend_tag }}" >> $GITHUB_ENV
          echo "FRONTEND_TAG=${{ steps.tags.outputs.frontend_tag }}" >> $GITHUB_ENV

      - name: Trigger deploy
        if: success()
        run: |
          echo "Backend: ${{ steps.tags.outputs.backend_tag }}"
          echo "Frontend: ${{ steps.tags.outputs.frontend_tag }}"
          echo "Deploy step — SSH to server and run docker-compose pull + up -d"
