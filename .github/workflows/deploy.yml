name: Deploy

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., v0.1.3, latest)"
        required: false
        type: string
        default: "latest"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., v0.1.3, latest)"
        required: false
        type: string
        default: "latest"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy configuration
        run: |
          has_ssh="${{ vars.DEPLOY_SSH_HOST != '' && 'true' || 'false' }}"
          has_webhook="${{ vars.DEPLOY_WEBHOOK_URL != '' && 'true' || 'false' }}"
          if [ "$has_ssh" = "false" ] && [ "$has_webhook" = "false" ]; then
            echo "Error: No deploy method configured."
            echo "Set either:"
            echo "  - vars.DEPLOY_SSH_HOST + secrets.DEPLOY_SSH_USERNAME + secrets.DEPLOY_SSH_KEY (SSH mode)"
            echo "  - vars.DEPLOY_WEBHOOK_URL (Webhook mode)"
            exit 1
          fi
          echo "SSH host configured:    $has_ssh"
          echo "Webhook URL configured: $has_webhook"

  # ── SSH 模式部署 ──
  deploy-ssh:
    needs: validate
    if: vars.DEPLOY_SSH_HOST != ''
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_SSH_HOST }}
          port: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          username: ${{ secrets.DEPLOY_SSH_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ vars.DEPLOY_WORK_DIR }}
            echo "Deploying image tag: ${{ inputs.image_tag }}"
            export IMAGE_TAG=${{ inputs.image_tag }}
            docker compose pull
            docker compose up -d

      - name: Summary
        run: |
          echo "Deployed via SSH"
          echo "Host:    ${{ vars.DEPLOY_SSH_HOST }}"
          echo "WorkDir: ${{ vars.DEPLOY_WORK_DIR }}"
          echo "Tag:     ${{ inputs.image_tag }}"

  # ── Webhook 模式部署 ──
  deploy-webhook:
    needs: validate
    if: vars.DEPLOY_WEBHOOK_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -sf -X POST "${{ vars.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"image_tag":"${{ inputs.image_tag }}"}'

      - name: Summary
        run: |
          echo "Deployed via Webhook"
          echo "URL: ${{ vars.DEPLOY_WEBHOOK_URL }}"
          echo "Tag: ${{ inputs.image_tag }}"
