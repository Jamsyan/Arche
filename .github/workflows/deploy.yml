name: Deploy

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., v0.1.3, latest)"
        required: false
        type: string
        default: "latest"
      ref:
        description: "Git ref being deployed"
        required: false
        type: string
        default: "refs/heads/master"
      environment:
        description: "Deployment environment name"
        required: false
        type: string
        default: "production"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., v0.1.3, latest)"
        required: false
        type: string
        default: "latest"

jobs:
  trigger-webhook:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -sf -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ inputs.ref }}","image_tag":"${{ inputs.image_tag }}"}'

      - name: Summary
        run: |
          echo "Deploying image tag: ${{ inputs.image_tag }}"
          echo "Ref: ${{ inputs.ref }}"
