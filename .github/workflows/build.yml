name: Build

on:
  workflow_call:
    outputs:
      image_tag:
        description: "Built image tag (empty if skipped)"
        value: ${{ jobs.version.outputs.image_tag }}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: lumoa-dev
  IMAGE_REPO: arche

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Push to master: 基于 Conventional Commits 自动计算下一个版本
      - name: Auto version
        id: auto
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          commit_format: conventional

      - name: Set image_tag
        id: set
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # tag push: 直接使用 tag 版本
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Manual tag push → $TAG"
          elif [ -n "${{ steps.auto.outputs.new_version }}" ]; then
            # push to master: 使用 auto 计算的版本
            echo "image_tag=${{ steps.auto.outputs.new_version }}" >> "$GITHUB_OUTPUT"
            echo "Auto version → ${{ steps.auto.outputs.new_version }}"
          else
            echo "No version → skip build"
          fi

  # ── 2. 并行构建 ──
  build-backend:
    needs: version
    if: needs.version.outputs.image_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}:backend-${{ needs.version.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}:backend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: version
    if: needs.version.outputs.image_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}:frontend-${{ needs.version.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
