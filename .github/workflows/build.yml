name: Build

on:
  workflow_call:
    outputs:
      image_tag:
        description: "Built image tag (empty if skipped)"
        value: ${{ jobs.version.outputs.image_tag }}

env:
  REGISTRY: crpi-furbxf8d6ydk7jxx.cn-shanghai.personal.cr.aliyuncs.com
  IMAGE_NAMESPACE: jamd
  IMAGE_REPO: arche

jobs:
  # ── 1. 版本路由 ──
  version:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.route.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: route
        run: |
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"
          TAG=""

          echo "Trigger: $EVENT"
          echo "Ref: $REF"

          # tag push (v*) → 用 tag 版本（手动发版）
          if [[ "$REF" == refs/tags/v* ]]; then
            TAG="${REF#refs/tags/v}"
            echo "Manual tag push → build: $TAG"

          # push 到 master → 按 git diff 算版本
          elif [[ "$EVENT" == "push" && "$REF" == refs/heads/master ]]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

            if [ -n "$LAST_TAG" ]; then
              # 计算源码总行数（避免除零）
              TOTAL=$(git ls-files | grep -E '\.(py|ts|vue|js|css)$' | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
              [ -z "$TOTAL" ] && TOTAL=1
              [ "$TOTAL" -eq 0 ] && TOTAL=1

              # 计算变更量
              STATS=$(git diff --shortstat "$LAST_TAG"...HEAD 2>/dev/null)
              INSERTIONS=$(echo "$STATS" | sed -n 's/.* \([0-9]*\) insertion.*/\1/p')
              DELETIONS=$(echo "$STATS" | sed -n 's/.* \([0-9]*\) deletion.*/\1/p')
              [ -z "$INSERTIONS" ] && INSERTIONS=0
              [ -z "$DELETIONS" ] && DELETIONS=0
              CHANGE_PERCENT=$(( (INSERTIONS + DELETIONS) * 100 / TOTAL ))

              # 确定版本位 — 按 PR（merge commit）级别计算，而非单个 commit
              # 1. 所有 commit body 中的 BREAKING CHANGE 是硬信号
              BODIES=$(git log "$LAST_TAG"...HEAD --format="%b" 2>/dev/null || echo "")
              if echo "$BODIES" | grep -qiE 'BREAKING CHANGE'; then
                BUMP="major"

              # 2. 取 merge commit 的分支名前缀（一个 PR 视为一个整体）
              else
                MERGES=$(git log "$LAST_TAG"...HEAD --merges --format="%s" 2>/dev/null || echo "")
                if echo "$MERGES" | grep -qiE 'from [^ ]+/breaking/'; then
                  BUMP="major"
                elif echo "$MERGES" | grep -qiE 'from [^ ]+/feat/'; then
                  BUMP="minor"
                elif [ -n "$MERGES" ]; then
                  # 有 merge commit 但未匹配到 breaking/feat → patch
                  BUMP="patch"

                # 3. 无 merge commit（直接 push）→ 代码变更比例兜底
                elif [ "$CHANGE_PERCENT" -gt 50 ]; then
                  BUMP="major"
                elif [ "$CHANGE_PERCENT" -gt 15 ]; then
                  BUMP="minor"
                else
                  BUMP="patch"
                fi
              fi

              # 解析版本并递增
              VERSION="${LAST_TAG#v}"
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3)

              case "$BUMP" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              TAG="${MAJOR}.${MINOR}.${PATCH}"
              echo "Push → bump ${BUMP} (${CHANGE_PERCENT}% changed): ${LAST_TAG#v} → $TAG"
            else
              TAG="0.0.1"
              echo "First build → $TAG"
            fi
          else
            echo "No build condition met → skip"
          fi

          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT

  # ── 2. 并行构建 ──
  build-backend:
    needs: version
    if: needs.version.outputs.image_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_REPO }}:backend-${{ needs.version.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_REPO }}:backend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: version
    if: needs.version.outputs.image_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_REPO }}:frontend-${{ needs.version.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_REPO }}:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
