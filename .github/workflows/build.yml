name: Build

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to build (e.g., 0.1.3, latest)"
        required: true
        type: string
    outputs:
      success:
        description: "Whether the build succeeded"
        value: ${{ jobs.summary.outputs.success }}
      backend_image:
        description: "Full path of backend image"
        value: ${{ jobs.summary.outputs.backend_image }}
      frontend_image:
        description: "Full path of frontend image"
        value: ${{ jobs.summary.outputs.frontend_image }}

env:
  REGISTRY: ${{ secrets.ALIYUN_REGISTRY_SERVER }}
  IMAGE_NAMESPACE: ${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}
  IMAGE_REPO: arche

jobs:
  # ── 1. 尝试登录 ──
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

  # ── 2. 并行构建 ──
  build-backend:
    needs: login
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_REPO }}/backend:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: login
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_REPO }}/frontend:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. 测试（有则跑，无则跳过） ──
  test:
    needs: [build-backend, build-frontend]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check if backend tests exist
        id: check
        run: |
          if find backend/ -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.check.outputs.has_tests == 'true'
        run: uv run pytest

  # ── 4. 回调结果 ──
  summary:
    needs: [login, build-backend, build-frontend, test]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.result.outputs.success }}
      backend_image: ${{ steps.result.outputs.backend_image }}
      frontend_image: ${{ steps.result.outputs.frontend_image }}
    steps:
      - name: Collect results
        id: result
        run: |
          LOGIN_OK="${{ needs.login.result }}"
          BE_OK="${{ needs.build-backend.result }}"
          FE_OK="${{ needs.build-frontend.result }}"
          TEST_OK="${{ needs.test.result }}"

          # 测试 skipped 也算成功
          TEST_PASSED="true"
          if [ "$TEST_OK" = "failure" ] || [ "$TEST_OK" = "cancelled" ]; then
            TEST_PASSED="false"
          fi

          SUCCESS="true"
          if [ "$LOGIN_OK" != "success" ] || [ "$BE_OK" != "success" ] || [ "$FE_OK" != "success" ] || [ "$TEST_PASSED" != "true" ]; then
            SUCCESS="false"
          fi

          BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_REPO }}/backend:${{ inputs.image_tag }}"
          FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_REPO }}/frontend:${{ inputs.image_tag }}"

          echo "success=${SUCCESS}" >> $GITHUB_OUTPUT
          echo "backend_image=${BACKEND_IMAGE}" >> $GITHUB_OUTPUT
          echo "frontend_image=${FRONTEND_IMAGE}" >> $GITHUB_OUTPUT

          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Login: $LOGIN_OK" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: $BE_OK" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: $FE_OK" >> $GITHUB_STEP_SUMMARY
          echo "- Test: $TEST_OK" >> $GITHUB_STEP_SUMMARY
          echo "- Success: $SUCCESS" >> $GITHUB_STEP_SUMMARY
