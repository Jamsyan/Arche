name: Build

on:
  workflow_call:
    outputs:
      image_tag:
        description: "Built image tag (empty if skipped)"
        value: ${{ jobs.version.outputs.image_tag }}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: lumoa-dev
  IMAGE_REPO: arche

jobs:
  # ── 1. 版本路由 ──
  version:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.route.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: route
        run: |
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"
          TAG=""

          echo "Trigger: $EVENT"
          echo "Ref: $REF"

          # tag push (v*) → 用 tag 版本（手动发版）
          if [[ "$REF" == refs/tags/v* ]]; then
            TAG="${REF#refs/tags/v}"
            echo "Manual tag push → build: $TAG"

          # push 到 master → 按 PR 合并或直接 push 算版本
          elif [[ "$EVENT" == "push" && "$REF" == refs/heads/master ]]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

            if [ -n "$LAST_TAG" ]; then
              # 计算代码变更行数（最权威的决定因素）
              STATS=$(git diff --shortstat "$LAST_TAG"...HEAD 2>/dev/null)
              INSERTIONS=$(echo "$STATS" | sed -n 's/.* \([0-9]*\) insertion.*/\1/p')
              [ -z "$INSERTIONS" ] && INSERTIONS=0

              # 获取 PR 合并记录（分支名作为辅助信号）
              MERGES=$(git log "$LAST_TAG"...HEAD --merges --format="%s" 2>/dev/null || echo "")

              # --- 版本判定：行数为主，分支名为辅 ---
              if [ "$INSERTIONS" -gt 15000 ]; then
                # 超大变更（>15000 行）→ major
                BUMP="major"
              elif [ "$INSERTIONS" -gt 2000 ]; then
                # 中型变更（2000-15000 行）→ minor
                BUMP="minor"
              else
                # 小变更（<2000 行）：分支名二次判断
                if echo "$MERGES" | grep -qiE 'from [^ ]+/breaking/'; then
                  BUMP="major"
                elif echo "$MERGES" | grep -qiE 'from [^ ]+/refactor/'; then
                  # 小重构也升 minor
                  BUMP="minor"
                else
                  # 小 feat / 小 fix / style / chore → patch
                  BUMP="patch"
                fi
              fi

              # 解析版本并递增
              VERSION="${LAST_TAG#v}"
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3)

              case "$BUMP" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              TAG="${MAJOR}.${MINOR}.${PATCH}"
              echo "Push → bump ${BUMP}: ${LAST_TAG#v} → $TAG"
            else
              TAG="0.0.1"
              echo "First build → $TAG"
            fi
          else
            echo "No build condition met → skip"
          fi

          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT

  # ── 2. 并行构建 ──
  build-backend:
    needs: version
    if: needs.version.outputs.image_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}:backend-${{ needs.version.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}:backend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: version
    if: needs.version.outputs.image_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}:frontend-${{ needs.version.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
