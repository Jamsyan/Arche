name: Build Docker Images

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to use (e.g., v0.1.3, latest)"
        required: false
        type: string
        default: "latest"
      push:
        description: "Whether to push images to registry (true/false)"
        required: false
        type: string
        default: "true"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to use (e.g., v0.1.3, latest)"
        required: false
        type: string
        default: "latest"

env:
  REGISTRY: registry.cn-shanghai.aliyuncs.com
  IMAGE_NAMESPACE: ${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}
  IMAGE_BACKEND: Arche-backend
  IMAGE_FRONTEND: Arche-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        if: inputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          TAG="${{ inputs.image_tag }}"
          BACKEND_TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:${TAG}"
          FRONTEND_TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:${TAG}"

          # Always add latest tag when building
          if [ "$TAG" != "latest" ]; then
            BACKEND_TAGS="${BACKEND_TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:latest"
            FRONTEND_TAGS="${FRONTEND_TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:latest"
          fi

          echo "backend=${BACKEND_TAGS}" >> $GITHUB_OUTPUT
          echo "frontend=${FRONTEND_TAGS}" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: ${{ inputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.backend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: ${{ inputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.frontend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Backend:  ${{ steps.tags.outputs.backend }}"
          echo "Frontend: ${{ steps.tags.outputs.frontend }}"

    outputs:
      backend_tags: ${{ steps.tags.outputs.backend }}
      frontend_tags: ${{ steps.tags.outputs.frontend }}
