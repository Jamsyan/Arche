name: Label Sync

on:
  schedule:
    - cron: "0 6 * * 1"  # 每周一 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels to repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const path = '.github/labels.json';

            // 读取配置
            const config = JSON.parse(fs.readFileSync(path, 'utf8'));
            const configByName = new Map(config.map(l => [l.name, l]));
            const configNames = new Set(config.keys());
            core.info(`Loaded ${config.length} labels from ${path}`);

            const { owner, repo } = context.repo;

            // 获取当前仓库所有标签
            const currentLabels = [];
            for await (const page of github.paginate.iterator(
              github.rest.issues.listLabelsForRepo,
              { owner, repo, per_page: 100 },
            )) {
              currentLabels.push(...page.data);
            }
            const currentByName = new Map(currentLabels.map(l => [l.name, l]));
            core.info(`Found ${currentLabels.length} labels on repository`);

            // 获取所有 open issue/PR 上正在使用的标签
            const usedNames = new Set();
            for await (const page of github.paginate.iterator(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'open', per_page: 100 },
            )) {
              for (const issue of page.data) {
                for (const label of issue.labels) {
                  usedNames.add(typeof label === 'string' ? label : label.name);
                }
              }
            }
            core.info(`Labels in use on open items: ${usedNames.size}`);

            // ── 创建/更新配置中的标签 ──
            let created = 0, updated = 0;
            for (const label of config) {
              const existing = currentByName.get(label.name);
              if (!existing) {
                await github.rest.issues.createLabel({
                  owner, repo,
                  name: label.name,
                  color: label.color,
                  description: label.description || '',
                });
                created++;
              } else if (
                existing.color !== label.color ||
                (existing.description || '') !== (label.description || '')
              ) {
                await github.rest.issues.updateLabel({
                  owner, repo,
                  name: label.name,
                  color: label.color,
                  description: label.description || '',
                });
                updated++;
              }
            }
            core.info(`Created: ${created}, Updated: ${updated}`);

            // ── 写入 Step Summary ──
            let summary = `## Label Sync Summary\n\n`;
            summary += `| Action | Count |\n|--------|------:|\n`;
            summary += `| Created | ${created} |\n`;
            summary += `| Updated | ${updated} |\n`;
            core.summary.addRaw(summary);
            await core.summary.write();
