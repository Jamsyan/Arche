# Issue 自动拆分子任务
# 在 Issue 评论区输入 /split 触发 AI 分析并将大 Issue 拆分为可执行的子任务
# 需要设置仓库 Secret: DEEPSEEK_API_KEY

name: AI Split Issue

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  split:
    if: startsWith(github.event.comment.body, '/split')
    runs-on: ubuntu-latest
    steps:
      - name: 获取 Issue 内容
        uses: actions/github-script@v7
        id: issue
        with:
          script: |
            const { issue } = context.payload;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 1,
            });

            core.setOutput('title', Buffer.from(issue.title || '').toString('base64'));
            core.setOutput('body', Buffer.from(issue.body || '').toString('base64'));
            core.setOutput('number', String(issue.number));
            core.setOutput('commenter', context.payload.comment.user.login);

      - name: AI 生成子任务
        id: analyze
        run: |
          $titleEncoded = '${{ steps.issue.outputs.title }}'
          $bodyEncoded = '${{ steps.issue.outputs.body }}'

          # base64 解码
          $title = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($titleEncoded))
          $body = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($bodyEncoded))

          $prompt = @"
          你是 Arche 项目的任务分解助手。

          请将以下 Issue 拆分为 3~5 个可执行的子任务。子任务应当：
          - 互相独立、边界清晰
          - 每个子任务都可以单独创建为一个 Issue
          - 按执行顺序排列
          - 包含明确的验收标准

          返回严格的 JSON 格式（不要 markdown 包裹）：
          {
            "tasks": [
              {
                "title": "子任务标题",
                "description": "子任务详细描述，包含具体的技术方案建议（使用中文）",
                "labels": ["建议的标签，必须来自项目现有标签体系"]
              }
            ]
          }

          注意：
          - 子任务标题保持在 10~30 字
          - 描述中给出实现思路和注意事项
          - labels 建议使用 type: 开头的标签
          "@

          $body = @{
            model = "deepseek-chat"
            messages = @(
              @{ role = "system"; content = $prompt }
              @{ role = "user"; content = "标题: $title`n`n内容: $body" }
            )
            response_format = @{ type = "json_object" }
            temperature = 0.3
          } | ConvertTo-Json -Depth 10

          $response = Invoke-RestMethod -Uri "https://api.deepseek.com/v1/chat/completions" `
            -Method Post `
            -Headers @{
              "Authorization" = "Bearer $env:DEEPSEEK_API_KEY"
              "Content-Type"  = "application/json"
            } `
            -Body $body

          $result = $response.choices[0].message.content
          echo "tasks=$result" >> $env:GITHUB_OUTPUT
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 创建子 Issue 并更新父 Issue
        uses: actions/github-script@v7
        env:
          TASKS: ${{ steps.analyze.outputs.tasks }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          COMMENTER: ${{ steps.issue.outputs.commenter }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            const commenter = process.env.COMMENTER;

            // 解析 AI 输出（通过 env 传递，避免引号冲突）
            const result = JSON.parse(process.env.TASKS);
            const tasks = result.tasks || [];

            if (tasks.length === 0) {
              core.warning('AI 没有生成子任务');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `@${commenter} AI 未能分解此 Issue 为子任务，请尝试手动拆分。`,
              });
              return;
            }

            core.info(`AI 生成了 ${tasks.length} 个子任务`);

            // ── 创建子 Issue ──
            const createdIssues = [];
            for (const task of tasks) {
              const body = [
                `> 此 Issue 由 #${issueNumber} 自动拆分\n`,
                `## 描述\n${task.description}\n`,
                `## 验收标准\n`,
                `- [ ] 完成编码实现\n`,
                `- [ ] 添加/更新测试\n`,
                `- [ ] 通过 lint 检查\n`,
                `- [ ] 更新相关文档\n`,
                `\n---\n*由 @${commenter} 通过 /split 触发 AI 自动生成*`,
              ].join('\n');

              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: task.title,
                body: body,
                labels: (task.labels || []).filter(Boolean),
              });
              createdIssues.push(newIssue);
              core.info(`创建子 Issue #${newIssue.number}: ${newIssue.title}`);
            }

            // ── 更新父 Issue 的任务列表 ──
            const taskList = createdIssues.map(
              (iss, i) => `- [ ] #${iss.number} ${iss.title}`
            ).join('\n');

            const parentComment = [
              `@${commenter} 已将 Issue 拆分为 ${createdIssues.length} 个子任务：\n`,
              `### 任务清单\n${taskList}\n`,
              `---\n*[🤖 AI 自动拆分] 请为每个子任务分配负责人和里程碑。*`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: parentComment,
            });

            // 同时更新父 Issue body，追加任务清单
            const { data: currentIssue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const existingBody = currentIssue.body || '';
            const subTaskSection = `\n\n---\n## 子任务\n${taskList}\n`;
            // 避免重复追加
            if (!existingBody.includes('## 子任务')) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: existingBody + subTaskSection,
              });
            }

            core.info(`父 Issue #${issueNumber} 已更新任务清单`);
