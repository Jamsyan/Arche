name: Adversarial Security Tests

on:
  workflow_call:
  schedule:
    # UTC 2:00 = 北京时间 10:00，每日定时扫描
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  adversarial:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run adversarial security tests
        id: tests
        run: |
          uv run pytest backend/tests/adversarial/ -v --tb=long --no-header 2>&1 | tee adversarial-report.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: adversarial-report-${{ github.run_id }}
          path: adversarial-report.txt
          retention-days: 7

      - name: Create Issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('adversarial-report.txt', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            const maxBodyLen = 60000;
            const truncatedReport = report.length > maxBodyLen
              ? report.slice(0, maxBodyLen) + '\n\n... (报告已截断，完整报告请查看 Actions Artifact: adversarial-report)'
              : report;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `安全对抗性测试失败 (${date})`,
              labels: ['security', 'adversarial-test', 'auto-generated'],
              body: [
                '## 安全对抗性测试报告',
                '',
                '**运行时间**: ' + new Date().toISOString(),
                '',
                '**触发方式**: 定时任务 (schedule)',
                '',
                '**测试结果**: 失败',
                '',
                '```',
                truncatedReport,
                '```',
                '',
                '> 完整报告请查看 GitHub Actions Artifact: adversarial-report',
              ].join('\n'),
            });
