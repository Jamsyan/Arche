# PR auto-labeler: applies labels based on changed file paths
# Used by .github/workflows/pr-labeler.yml
# Reference: https://github.com/actions/labeler

"area: backend":
  - any: ["backend/**/*"]

"area: frontend":
  - any: ["frontend/src/**/*"]

"area: ci-cd":
  - any: [".github/workflows/**/*", "Dockerfile*", "docker-compose*.yml", "nginx/**/*"]

"type: docs":
  - any: ["docs/**/*", "README.md", "CONTRIBUTING.md", "SECURITY.md", "AGENTS.md"]
  - changed-files:
    - any-glob-to-any-file: 'backend/**/*'

"area: frontend":
  - changed-files:
    - any-glob-to-any-file: 'frontend/src/**/*'

"area: ci-cd":
  - changed-files:
    - any-glob-to-any-file:
      - '.github/workflows/**/*'
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - 'nginx/**/*'

"type: docs":
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**/*'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'AGENTS.md'
