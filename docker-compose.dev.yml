services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: veil
      POSTGRES_USER: veil
      POSTGRES_PASSWORD: veil
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U veil
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
