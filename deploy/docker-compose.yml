# Veil 生产部署
# 用法: cd ~/admin/veil && docker compose up -d

services:
  # ===================== PostgreSQL =====================
  postgres:
    image: postgres:17-alpine
    container_name: veil-postgres
    environment:
      POSTGRES_DB: veil
      POSTGRES_USER: veil
      POSTGRES_PASSWORD: ${DB_PASSWORD:-veil}
    volumes:
      - ~/admin/data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U veil
      interval: 5s
      timeout: 3s
      retries: 5

  # ===================== 后端 =====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: veil-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://veil:${DB_PASSWORD:-veil}@postgres:5432/veil
      SECRET_KEY: ${SECRET_KEY}
      STORAGE_PATH: /data/storage
      CORS_ORIGINS: ${CORS_ORIGINS:-http://jamsyan.top}
    volumes:
      - ~/admin/storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:8000/docs
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===================== 前端 =====================
  nginx:
    image: docker.m.daocloud.io/library/nginx:1.27-alpine
    container_name: veil-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
